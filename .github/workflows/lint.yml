name: lint

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check syntax (all .py files)
        run: python -m py_compile app/main.py && find app -name "*.py" -exec python -m py_compile {} +

      - name: Check imports
        run: python -c "from app.main import app; print('Imports OK')"

      - name: Lint with ruff
        run: pip install ruff && ruff check app/ --select E,F,W --ignore E501
