name: Feature Request
description: Suggest an improvement or new feature
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: What would you like?
      placeholder: Describe the feature or improvement
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why is this useful?
      placeholder: How would this help with co-parenting communication?
