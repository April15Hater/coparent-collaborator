{% extends "base.html" %}
{% block title %}Topic — Ace's Co-Parenting Board{% endblock %}

{% block content %}
<div class="mb-4">
    <a href="/topics" class="inline-flex items-center gap-1 text-sm text-slate-500 hover:text-brand-600 transition">
        <svg style="width:16px;height:16px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        All Topics
    </a>
</div>

<div id="topic-header" class="bg-white rounded-xl border border-slate-200 p-5 mb-4 shadow-sm">
    <div class="text-center py-4 text-slate-400 text-sm">Loading...</div>
</div>

<!-- AI Summary -->
<div id="summary-container" class="hidden mb-4">
    <div class="bg-gradient-to-r from-indigo-50 to-violet-50 border border-indigo-200 rounded-xl p-4">
        <div class="flex items-center justify-between mb-2">
            <h3 class="text-sm font-semibold text-indigo-800 flex items-center gap-1.5">
                <svg style="width:16px;height:16px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
                Thread Summary
            </h3>
            <button onclick="document.getElementById('summary-container').classList.add('hidden')"
                class="text-xs text-indigo-400 hover:text-indigo-600 transition">Dismiss</button>
        </div>
        <div id="summary-text" class="text-sm text-indigo-900 whitespace-pre-wrap leading-relaxed"></div>
    </div>
</div>

<div id="timeline" class="space-y-2 mb-6">
</div>

<!-- Comment form -->
<div class="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
    <h3 class="text-sm font-semibold text-slate-700 mb-3">Add an update</h3>
    <form id="comment-form">
        <textarea id="comment-body" name="body" rows="3" required
            placeholder="Share an update, question, or response..."
            class="w-full px-3.5 py-3 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 text-sm resize-y mb-3"></textarea>

        <!-- AI Tone buttons -->
        <div id="tone-bar" class="flex flex-wrap gap-1.5 mb-3 items-center">
            <span class="text-xs text-slate-400 flex items-center gap-1 mr-1">
                <svg style="width:14px;height:14px" class="text-violet-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
                Adjust tone
            </span>
            <button type="button" onclick="rewriteTone('softer')"
                class="tone-btn px-2.5 py-1 text-xs rounded-lg bg-sky-50 text-sky-700 hover:bg-sky-100 border border-sky-200 transition font-medium">Softer</button>
            <button type="button" onclick="rewriteTone('stronger')"
                class="tone-btn px-2.5 py-1 text-xs rounded-lg bg-orange-50 text-orange-700 hover:bg-orange-100 border border-orange-200 transition font-medium">Stronger</button>
            <button type="button" onclick="rewriteTone('neutral')"
                class="tone-btn px-2.5 py-1 text-xs rounded-lg bg-slate-50 text-slate-600 hover:bg-slate-100 border border-slate-200 transition font-medium">Neutral</button>
            <button type="button" onclick="rewriteTone('professional')"
                class="tone-btn px-2.5 py-1 text-xs rounded-lg bg-violet-50 text-violet-700 hover:bg-violet-100 border border-violet-200 transition font-medium">Professional</button>
            <button type="button" onclick="rewriteTone('shorter')"
                class="tone-btn px-2.5 py-1 text-xs rounded-lg bg-emerald-50 text-emerald-700 hover:bg-emerald-100 border border-emerald-200 transition font-medium">Shorter</button>
            <button type="button" onclick="rewriteTone('longer')"
                class="tone-btn px-2.5 py-1 text-xs rounded-lg bg-emerald-50 text-emerald-700 hover:bg-emerald-100 border border-emerald-200 transition font-medium">Longer</button>
            <button type="button" onclick="rewriteTone('more_detailed')"
                class="tone-btn px-2.5 py-1 text-xs rounded-lg bg-teal-50 text-teal-700 hover:bg-teal-100 border border-teal-200 transition font-medium">More Detail</button>
            <button type="button" onclick="rewriteTone('less_detailed')"
                class="tone-btn px-2.5 py-1 text-xs rounded-lg bg-teal-50 text-teal-700 hover:bg-teal-100 border border-teal-200 transition font-medium">Less Detail</button>
        </div>

        <!-- Rewrite status -->
        <div id="rewrite-status" class="hidden mb-3 text-xs text-slate-500 flex items-center gap-2 bg-slate-50 rounded-lg px-3 py-2">
            <svg style="width:14px;height:14px;flex-shrink:0" class="text-violet-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
            <span id="rewrite-msg"></span>
            <button type="button" onclick="undoRewrite()" id="undo-btn" class="hidden text-brand-600 hover:underline font-medium">Undo</button>
        </div>

        <!-- Appropriateness warning -->
        <div id="appropriateness-warning" class="hidden mb-3 p-4 bg-amber-50 border border-amber-200 rounded-xl">
            <p class="text-sm text-amber-800 font-semibold flex items-center gap-1.5">
                <svg style="width:16px;height:16px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>
                Heads up
            </p>
            <p id="appropriateness-reason" class="text-sm text-amber-700 mt-1.5 leading-relaxed"></p>
            <div class="flex gap-2 mt-3">
                <button type="button" onclick="makeNice()"
                    class="px-3 py-1.5 text-xs bg-brand-100 text-brand-800 rounded-lg hover:bg-brand-200 font-semibold flex items-center gap-1 transition">
                    <svg style="width:12px;height:12px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
                    Make nice
                </button>
                <button type="button" onclick="dismissWarning()"
                    class="px-3 py-1.5 text-xs bg-white text-slate-600 border border-slate-200 rounded-lg hover:bg-slate-50 transition">Edit my message</button>
                <button type="button" onclick="postAnyway()"
                    class="px-3 py-1.5 text-xs bg-amber-100 text-amber-800 rounded-lg hover:bg-amber-200 transition">Post anyway</button>
            </div>
        </div>

        <button type="submit" id="btn-post"
            class="px-5 py-2.5 bg-brand-600 text-white text-sm rounded-lg hover:bg-brand-700 transition disabled:opacity-40 font-medium shadow-sm">
            Post Update
        </button>
    </form>
</div>

<script>
const issueId = {{ issue_id | tojson }};
const userRole = {{ user.role | tojson }};

function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function fmtDate(ts) { if (!ts) return ''; const d = ts.endsWith('Z') ? ts : ts + 'Z'; return new Date(d).toLocaleString(); }

const categoryColors = {
    education: 'bg-blue-50 text-blue-700 border border-blue-200',
    medical: 'bg-emerald-50 text-emerald-700 border border-emerald-200',
    behavioral: 'bg-amber-50 text-amber-700 border border-amber-200',
    legal: 'bg-red-50 text-red-700 border border-red-200',
    scheduling: 'bg-violet-50 text-violet-700 border border-violet-200',
    financial: 'bg-yellow-50 text-yellow-700 border border-yellow-200',
    other: 'bg-slate-50 text-slate-600 border border-slate-200',
};

const aiIcon = `<svg style="width:14px;height:14px;display:inline-block;vertical-align:middle" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>`;

async function loadIssue() {
    try {
        const resp = await fetch(`/api/issues/${issueId}`);
        if (resp.status === 401) { window.location = '/login'; return; }
        const issue = await resp.json();
        renderHeader(issue);
    } catch (e) {
        document.getElementById('topic-header').innerHTML =
            '<div class="text-center py-4 text-red-400 text-sm">Failed to load topic.</div>';
    }
}

function renderHeader(issue) {
    const catColor = categoryColors[issue.category] || categoryColors.other;
    let statusActions = '';
    if (userRole === 'parent_a') {
        statusActions = `
            <div class="mt-4 pt-3 border-t border-slate-100 flex gap-2 flex-wrap items-center">
                <select id="status-select" class="text-sm border border-slate-200 rounded-lg px-3 py-1.5 focus:ring-2 focus:ring-brand-500">
                    <option value="open" ${issue.status === 'open' ? 'selected' : ''}>Open</option>
                    <option value="in_progress" ${issue.status === 'in_progress' ? 'selected' : ''}>In Progress</option>
                    <option value="waiting_on_parent_a" ${issue.status === 'waiting_on_parent_a' ? 'selected' : ''}>Needs Joey's input</option>
                    <option value="waiting_on_parent_b" ${issue.status === 'waiting_on_parent_b' ? 'selected' : ''}>Needs Christina's input</option>
                    <option value="resolved" ${issue.status === 'resolved' ? 'selected' : ''}>Resolved together</option>
                    <option value="closed" ${issue.status === 'closed' ? 'selected' : ''}>Closed</option>
                </select>
                <button onclick="updateStatus()" class="text-sm px-3 py-1.5 bg-slate-100 text-slate-600 rounded-lg hover:bg-slate-200 transition">Update Status</button>
            </div>`;
    }

    document.getElementById('topic-header').innerHTML = `
        <div class="flex items-start justify-between">
            <div class="flex-1 min-w-0">
                <h1 class="text-lg font-semibold text-slate-800 mb-2">${esc(issue.title)}</h1>
                <div class="flex items-center gap-2 text-sm flex-wrap">
                    <span class="px-2 py-0.5 rounded-md text-[11px] font-medium ${catColor}">${esc(issue.category)}</span>
                    <span class="text-slate-500 font-medium">${esc(issue.display_status)}</span>
                    ${issue.due_date ? `<span class="text-orange-500 font-medium text-xs">Due ${issue.due_date}</span>` : ''}
                </div>
            </div>
            <button onclick="summarizeThread()" id="btn-summarize"
                class="shrink-0 ml-3 flex items-center gap-1.5 text-xs px-3 py-1.5 bg-gradient-to-r from-indigo-50 to-violet-50 text-indigo-700 rounded-lg hover:from-indigo-100 hover:to-violet-100 border border-indigo-200 transition font-medium shadow-sm">
                ${aiIcon} Summarize
            </button>
        </div>
        ${issue.description ? `<p class="mt-3 text-slate-600 text-sm leading-relaxed">${esc(issue.description)}</p>` : ''}
        ${statusActions}
    `;
}

async function loadTimeline() {
    try {
        const resp = await fetch(`/api/issues/${issueId}/timeline`);
        const entries = await resp.json();
        cachedTimeline = entries;
        renderTimeline(entries);
    } catch (e) {
        document.getElementById('timeline').innerHTML =
            '<div class="text-center py-4 text-red-400 text-sm">Failed to load updates.</div>';
    }
}

function renderTimeline(entries) {
    const el = document.getElementById('timeline');
    if (!entries.length) {
        el.innerHTML = '<div class="text-center py-8 text-slate-400 text-sm">No updates yet. Start the conversation below.</div>';
        return;
    }
    el.innerHTML = entries.map(e => {
        if (e.type === 'comment') {
            const date = fmtDate(e.created_at);
            const initials = (e.actor?.display_name || 'U').charAt(0).toUpperCase();
            const isJoey = e.actor?.role === 'parent_a';
            const avatarColor = isJoey ? 'bg-brand-100 text-brand-700' : 'bg-violet-100 text-violet-700';
            return `
                <div class="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
                    <div class="flex items-start gap-3">
                        <div style="width:32px;height:32px;border-radius:50%;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700" class="${avatarColor}">${initials}</div>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="font-semibold text-sm text-slate-800">${esc(e.actor?.display_name || 'Unknown')}</span>
                                <span class="text-xs text-slate-400">${date}</span>
                            </div>
                            <p class="text-slate-700 text-sm whitespace-pre-wrap leading-relaxed">${esc(e.body)}</p>
                        </div>
                    </div>
                </div>`;
        } else {
            const date = fmtDate(e.created_at);
            return `
                <div class="flex items-center gap-2 px-4 py-1.5 text-xs text-slate-400">
                    <div class="flex-1 h-px bg-slate-200"></div>
                    <span>${esc(e.actor?.display_name || 'System')} changed status to <strong class="text-slate-600">${esc(e.new_display || e.new_status)}</strong></span>
                    <span>${date}</span>
                    <div class="flex-1 h-px bg-slate-200"></div>
                </div>`;
        }
    }).join('');
}

async function updateStatus() {
    const newStatus = document.getElementById('status-select').value;
    try {
        await fetch(`/api/issues/${issueId}`, {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({status: newStatus}),
        });
        loadIssue();
        loadTimeline();
    } catch (e) { alert('Failed to update status'); }
}

let skipCheck = false;
let cachedTimeline = [];

document.getElementById('comment-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const body = document.getElementById('comment-body').value.trim();
    if (!body) return;

    const btnPost = document.getElementById('btn-post');
    const threadHistory = cachedTimeline
        .filter(e => e.type === 'comment')
        .map(e => ({ author: e.actor?.display_name || 'Unknown', body: e.body || '' }));

    if (!skipCheck) {
        btnPost.disabled = true;
        btnPost.textContent = 'Checking...';
        try {
            const checkResp = await fetch('/api/ai/check', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({text: body, thread_history: threadHistory}),
            });
            if (checkResp.ok) {
                const check = await checkResp.json();
                if (!check.appropriate) {
                    document.getElementById('appropriateness-reason').textContent = check.reason;
                    document.getElementById('appropriateness-warning').classList.remove('hidden');
                    btnPost.disabled = true;
                    btnPost.textContent = 'Post Update';
                    return;
                }
            }
        } catch (err) { }
        btnPost.disabled = false;
        btnPost.textContent = 'Post Update';
    }
    skipCheck = false;

    try {
        const resp = await fetch(`/api/issues/${issueId}/comments`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({body}),
        });
        if (resp.ok) {
            document.getElementById('comment-body').value = '';
            document.getElementById('appropriateness-warning').classList.add('hidden');
            document.getElementById('rewrite-status').classList.add('hidden');
            originalText = '';
            loadTimeline();
        }
    } catch (e) { alert('Failed to post update'); }
});

function postAnyway() {
    skipCheck = true;
    document.getElementById('appropriateness-warning').classList.add('hidden');
    document.getElementById('btn-post').disabled = false;
    document.getElementById('comment-form').requestSubmit();
}

function dismissWarning() {
    document.getElementById('appropriateness-warning').classList.add('hidden');
    document.getElementById('btn-post').disabled = false;
    document.getElementById('comment-body').focus();
}

async function makeNice() {
    document.getElementById('appropriateness-warning').classList.add('hidden');
    document.getElementById('btn-post').disabled = false;
    await rewriteTone('softer');
}

// ── AI Thread Summary ────────────────────────────────────────────────────
async function summarizeThread() {
    const btn = document.getElementById('btn-summarize');
    const container = document.getElementById('summary-container');
    const textEl = document.getElementById('summary-text');

    btn.disabled = true;
    btn.innerHTML = `${aiIcon} Summarizing...`;

    try {
        const resp = await fetch(`/api/ai/summarize/${issueId}`);
        if (!resp.ok) {
            const err = await resp.json();
            textEl.textContent = err.detail || 'Could not generate summary.';
        } else {
            const data = await resp.json();
            textEl.textContent = data.summary;
        }
        container.classList.remove('hidden');
    } catch (e) {
        textEl.textContent = 'Could not connect to summary service.';
        container.classList.remove('hidden');
    } finally {
        btn.disabled = false;
        btn.innerHTML = `${aiIcon} Summarize`;
    }
}

// ── AI Tone Rewrite ──────────────────────────────────────────────────────
let originalText = '';

async function rewriteTone(tone) {
    const textarea = document.getElementById('comment-body');
    const text = textarea.value.trim();
    if (!text) { textarea.focus(); return; }

    if (!originalText) originalText = text;

    const statusEl = document.getElementById('rewrite-status');
    const msgEl = document.getElementById('rewrite-msg');
    const undoBtn = document.getElementById('undo-btn');
    statusEl.classList.remove('hidden');
    msgEl.textContent = 'Rewriting...';
    undoBtn.classList.add('hidden');

    document.querySelectorAll('.tone-btn').forEach(b => b.disabled = true);

    try {
        const resp = await fetch('/api/ai/rewrite', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ text, tone }),
        });

        if (!resp.ok) {
            const err = await resp.json();
            msgEl.textContent = err.detail || 'Rewrite failed';
            return;
        }

        const data = await resp.json();
        textarea.value = data.rewritten;
        textarea.style.height = 'auto';
        textarea.style.height = textarea.scrollHeight + 'px';

        const label = tone.replace('_', ' ');
        msgEl.textContent = `Adjusted to "${label}" tone`;
        undoBtn.classList.remove('hidden');
    } catch (e) {
        msgEl.textContent = 'Could not connect to rewrite service';
    } finally {
        document.querySelectorAll('.tone-btn').forEach(b => b.disabled = false);
    }
}

function undoRewrite() {
    if (!originalText) return;
    document.getElementById('comment-body').value = originalText;
    originalText = '';
    document.getElementById('rewrite-status').classList.add('hidden');
}

loadIssue();
loadTimeline();
</script>
{% endblock %}
