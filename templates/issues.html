{% extends "base.html" %}
{% block title %}Topics — Ace's Co-Parenting Board{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-5">
    <h1 class="text-lg font-semibold text-slate-800">Topics</h1>
    {% if user.role == 'parent_a' %}
    <button onclick="document.getElementById('new-topic-modal').classList.remove('hidden')"
        class="px-4 py-2 bg-brand-600 text-white text-sm rounded-lg hover:bg-brand-700 transition shadow-sm">
        + New Topic
    </button>
    {% endif %}
</div>

<!-- Filters -->
<div class="flex gap-1.5 mb-5 flex-wrap">
    <button onclick="filterIssues('',this)" class="filter-btn px-3 py-1.5 text-xs font-medium rounded-lg bg-slate-200 text-slate-700 hover:bg-slate-300 transition">All</button>
    <button onclick="filterIssues('open',this)" class="filter-btn px-3 py-1.5 text-xs font-medium rounded-lg bg-slate-100 text-slate-500 hover:bg-slate-200 transition">Open</button>
    <button onclick="filterIssues('in_progress',this)" class="filter-btn px-3 py-1.5 text-xs font-medium rounded-lg bg-slate-100 text-slate-500 hover:bg-slate-200 transition">In Progress</button>
    <button onclick="filterIssues('waiting_on_parent_a',this)" class="filter-btn px-3 py-1.5 text-xs font-medium rounded-lg bg-slate-100 text-slate-500 hover:bg-slate-200 transition">Needs Joey</button>
    <button onclick="filterIssues('waiting_on_parent_b',this)" class="filter-btn px-3 py-1.5 text-xs font-medium rounded-lg bg-slate-100 text-slate-500 hover:bg-slate-200 transition">Needs Christina</button>
    <button onclick="filterIssues('resolved',this)" class="filter-btn px-3 py-1.5 text-xs font-medium rounded-lg bg-slate-100 text-slate-500 hover:bg-slate-200 transition">Resolved</button>
</div>

<!-- Issue list -->
<div id="issues-list" class="space-y-2">
    <div class="text-center py-12 text-slate-400 text-sm">Loading topics...</div>
</div>

<!-- New topic modal (parent_a only) -->
<div id="new-topic-modal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-xl w-full max-w-md p-6 shadow-xl">
        <h2 class="text-lg font-semibold text-slate-800 mb-4">New Topic</h2>
        <form id="new-topic-form" class="space-y-3">
            <div>
                <label class="block text-xs font-medium text-slate-500 mb-1">Title</label>
                <input type="text" name="title" required
                    class="w-full px-3 py-2.5 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 text-sm" />
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-medium text-slate-500 mb-1">Category</label>
                    <select name="category" required
                        class="w-full px-3 py-2.5 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500 text-sm">
                        <option value="education">Education</option>
                        <option value="medical">Medical</option>
                        <option value="behavioral">Behavioral</option>
                        <option value="legal">Legal</option>
                        <option value="scheduling">Scheduling</option>
                        <option value="financial">Financial</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-500 mb-1">Priority</label>
                    <select name="priority"
                        class="w-full px-3 py-2.5 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500 text-sm">
                        <option value="normal">Normal</option>
                        <option value="high">High</option>
                        <option value="urgent">Urgent</option>
                        <option value="low">Low</option>
                    </select>
                </div>
            </div>
            <div>
                <label class="block text-xs font-medium text-slate-500 mb-1">Description</label>
                <textarea name="description" rows="3"
                    class="w-full px-3 py-2.5 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500 text-sm"></textarea>
            </div>
            <div>
                <label class="block text-xs font-medium text-slate-500 mb-1">Due Date (optional)</label>
                <input type="date" name="due_date"
                    class="w-full px-3 py-2.5 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500 text-sm" />
            </div>
            <div class="flex gap-2 pt-2">
                <button type="submit"
                    class="flex-1 py-2.5 bg-brand-600 text-white text-sm rounded-lg hover:bg-brand-700 transition font-medium">Create Topic</button>
                <button type="button"
                    onclick="document.getElementById('new-topic-modal').classList.add('hidden')"
                    class="flex-1 py-2.5 bg-slate-100 text-slate-600 text-sm rounded-lg hover:bg-slate-200 transition">Cancel</button>
            </div>
        </form>
    </div>
</div>

<script>
const categoryColors = {
    education: 'bg-blue-50 text-blue-700 border border-blue-200',
    medical: 'bg-emerald-50 text-emerald-700 border border-emerald-200',
    behavioral: 'bg-amber-50 text-amber-700 border border-amber-200',
    legal: 'bg-red-50 text-red-700 border border-red-200',
    scheduling: 'bg-violet-50 text-violet-700 border border-violet-200',
    financial: 'bg-yellow-50 text-yellow-700 border border-yellow-200',
    other: 'bg-slate-50 text-slate-600 border border-slate-200',
};

const priorityIndicators = {
    urgent: '<span class="inline-flex items-center gap-1 text-red-600 font-medium text-xs"><span class="w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse"></span>Urgent</span>',
    high: '<span class="inline-flex items-center gap-1 text-orange-600 text-xs"><span class="w-1.5 h-1.5 rounded-full bg-orange-400"></span>High</span>',
    normal: '',
    low: '',
};

function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

let currentFilter = '';

async function loadIssues(statusFilter) {
    const url = statusFilter ? `/api/issues?status=${statusFilter}` : '/api/issues';
    try {
        const resp = await fetch(url);
        if (resp.status === 401) { window.location = '/login'; return; }
        const issues = await resp.json();
        renderIssues(issues);
    } catch (e) {
        document.getElementById('issues-list').innerHTML =
            '<div class="text-center py-12 text-red-400 text-sm">Failed to load topics.</div>';
    }
}

function renderIssues(issues) {
    const el = document.getElementById('issues-list');
    if (!issues.length) {
        el.innerHTML = '<div class="text-center py-12 text-slate-400 text-sm">No topics found.</div>';
        return;
    }
    el.innerHTML = issues.map(i => `
        <a href="/topics/${i.id}" class="block bg-white rounded-xl border border-slate-200 p-4 hover:border-brand-300 hover:shadow-md transition-all group">
            <div class="flex items-start justify-between">
                <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2 mb-1.5">
                        ${priorityIndicators[i.priority] || ''}
                        <h3 class="font-medium text-slate-800 group-hover:text-brand-700 transition truncate">${esc(i.title)}</h3>
                    </div>
                    <div class="flex items-center gap-2 text-xs flex-wrap">
                        <span class="px-2 py-0.5 rounded-md text-[11px] font-medium ${categoryColors[i.category] || categoryColors.other}">${esc(i.category)}</span>
                        <span class="text-slate-400">${esc(i.display_status)}</span>
                        ${i.due_date ? `<span class="text-orange-500 font-medium">Due ${i.due_date}</span>` : ''}
                        <span class="text-slate-400">${i.comment_count} update${i.comment_count !== 1 ? 's' : ''}</span>
                    </div>
                </div>
                <svg class="w-4 h-4 text-slate-300 group-hover:text-brand-400 transition ml-2 mt-1 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                </svg>
            </div>
        </a>
    `).join('');
}

function filterIssues(status, btn) {
    currentFilter = status;
    document.querySelectorAll('.filter-btn').forEach(b => {
        b.className = b.className.replace(/bg-slate-200 text-slate-700/g, 'bg-slate-100 text-slate-500');
    });
    if (btn) btn.className = btn.className.replace(/bg-slate-100 text-slate-500/g, 'bg-slate-200 text-slate-700');
    loadIssues(status);
}

document.getElementById('new-topic-form')?.addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    const data = {
        title: form.title.value,
        category: form.category.value,
        priority: form.priority.value,
        description: form.description.value || null,
        due_date: form.due_date.value || null,
    };
    try {
        const resp = await fetch('/api/issues', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data),
        });
        if (resp.ok) {
            document.getElementById('new-topic-modal').classList.add('hidden');
            form.reset();
            loadIssues(currentFilter);
        }
    } catch (e) { alert('Failed to create topic'); }
});

loadIssues('');
</script>
{% endblock %}
