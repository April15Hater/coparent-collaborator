{% extends "base.html" %}
{% block title %}Topics — Ace's Co-Parenting Board{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">Topics</h1>
    {% if user.role == 'parent_a' %}
    <button onclick="document.getElementById('new-topic-modal').classList.remove('hidden')"
        class="btn btn-primary btn-sm">+ New Topic</button>
    {% endif %}
</div>

<!-- Filters + Sort -->
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">
    <div class="filters" style="margin-bottom:0">
        <button onclick="filterIssues('',this)" class="filter-btn active">All</button>
        <button onclick="filterIssues('open',this)" class="filter-btn">Open</button>
        <button onclick="filterIssues('in_progress',this)" class="filter-btn">In Progress</button>
        <button onclick="filterIssues('waiting_on_parent_a',this)" class="filter-btn">Needs Joey</button>
        <button onclick="filterIssues('waiting_on_parent_b',this)" class="filter-btn">Needs Christina</button>
        <button onclick="filterIssues('resolved',this)" class="filter-btn">Resolved</button>
    </div>
    <div style="display:flex;align-items:center;gap:4px">
        <span style="font-size:12px;color:#94a3b8;white-space:nowrap">Sort by</span>
        <select id="sort-select" onchange="changeSort(this.value)" class="select"
            style="width:auto;padding:6px 12px;font-size:12px;border-radius:8px">
            <option value="priority">Priority</option>
            <option value="updated">Recently Updated</option>
            <option value="newest">Newest First</option>
            <option value="oldest">Oldest First</option>
            <option value="due_date">Due Date</option>
        </select>
    </div>
</div>

<!-- Issue list -->
<div id="issues-list">
    <div class="empty-state">Loading topics...</div>
</div>

<!-- New topic modal -->
<div id="new-topic-modal" class="modal-overlay hidden">
    <div class="modal">
        <h2>New Topic</h2>
        <form id="new-topic-form">
            <div class="mb-3">
                <label class="label">Title</label>
                <input type="text" name="title" required class="input" />
            </div>
            <div class="grid-2 mb-3">
                <div>
                    <label class="label">Category</label>
                    <select name="category" required class="select">
                        <option value="education">Education</option>
                        <option value="medical">Medical</option>
                        <option value="behavioral">Behavioral</option>
                        <option value="legal">Legal</option>
                        <option value="scheduling">Scheduling</option>
                        <option value="financial">Financial</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div>
                    <label class="label">Priority</label>
                    <select name="priority" class="select">
                        <option value="normal">Normal</option>
                        <option value="high">High</option>
                        <option value="urgent">Urgent</option>
                        <option value="low">Low</option>
                    </select>
                </div>
            </div>
            <div class="mb-3">
                <label class="label">Description</label>
                <textarea name="description" rows="3" class="textarea"></textarea>
            </div>
            <div class="mb-3">
                <label class="label">Due Date (optional)</label>
                <input type="date" name="due_date" class="input" />
            </div>
            <div class="flex gap-2 pt-2">
                <button type="submit" class="btn btn-primary flex-1">Create Topic</button>
                <button type="button" onclick="document.getElementById('new-topic-modal').classList.add('hidden')"
                    class="btn btn-secondary flex-1">Cancel</button>
            </div>
        </form>
    </div>
</div>

<script>
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

let currentFilter = '';
let currentSort = 'priority';

function changeSort(sort) {
    currentSort = sort;
    loadIssues(currentFilter);
}

async function loadIssues(statusFilter) {
    let url = '/api/issues?sort=' + currentSort;
    if (statusFilter) url += '&status=' + statusFilter;
    try {
        const resp = await fetch(url);
        if (resp.status === 401) { window.location = '/login'; return; }
        const issues = await resp.json();
        renderIssues(issues);
    } catch (e) {
        document.getElementById('issues-list').innerHTML =
            '<div class="empty-state" style="color:#ef4444">Failed to load topics.</div>';
    }
}

function renderIssues(issues) {
    const el = document.getElementById('issues-list');
    if (!issues.length) {
        el.innerHTML = '<div class="empty-state">No topics found.</div>';
        return;
    }
    el.innerHTML = issues.map(i => {
        const priorityHtml = i.priority === 'urgent'
            ? '<span class="priority priority-urgent"><span class="dot"></span>Urgent</span>'
            : i.priority === 'high'
            ? '<span class="priority priority-high"><span class="dot"></span>High</span>'
            : '';

        return `
        <a href="/topics/${i.id}" class="card">
            <div class="card-header">
                <div class="card-body">
                    <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
                        ${priorityHtml}
                    </div>
                    <div class="card-title">${esc(i.title)}</div>
                    <div class="card-meta">
                        <span class="badge badge-${i.category}">${esc(i.category)}</span>
                        <span class="status status-${i.status}">${esc(i.display_status)}</span>
                        ${i.due_date ? `<span style="color:#ea580c;font-weight:500">Due ${i.due_date}</span>` : ''}
                        <span class="text-muted">${i.comment_count} update${i.comment_count !== 1 ? 's' : ''}</span>
                    </div>
                </div>
                <svg class="card-chevron" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                </svg>
            </div>
        </a>`;
    }).join('');
}

function filterIssues(status, btn) {
    currentFilter = status;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
    loadIssues(status);
}

document.getElementById('new-topic-form')?.addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    const data = {
        title: form.title.value,
        category: form.category.value,
        priority: form.priority.value,
        description: form.description.value || null,
        due_date: form.due_date.value || null,
    };
    try {
        const resp = await fetch('/api/issues', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data),
        });
        if (resp.ok) {
            document.getElementById('new-topic-modal').classList.add('hidden');
            form.reset();
            loadIssues(currentFilter);
        }
    } catch (e) { alert('Failed to create topic'); }
});

loadIssues('');
</script>

<!-- Export options -->
<div style="margin-top:24px;padding-top:16px;border-top:1px solid #e2e8f0;display:flex;gap:8px;justify-content:flex-end">
    <a href="/export/csv" class="btn btn-sm btn-secondary" style="text-decoration:none">
        <svg style="width:14px;height:14px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        Download CSV
    </a>
    <a href="/export/print" target="_blank" class="btn btn-sm btn-secondary" style="text-decoration:none">
        <svg style="width:14px;height:14px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>
        Print / Save PDF
    </a>
</div>
{% endblock %}
