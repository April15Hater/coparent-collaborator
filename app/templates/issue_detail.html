{% extends "base.html" %}
{% block title %}Topic — Ace's Co-Parenting Board{% endblock %}

{% block content %}
<div class="mb-4">
    <a href="/topics" style="display:inline-flex;align-items:center;gap:4px;font-size:14px;color:#64748b">
        <svg style="width:16px;height:16px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        All Topics
    </a>
</div>

<div id="topic-header" class="topic-header">
    <div class="empty-state">Loading...</div>
</div>

<!-- AI Summary -->
<div id="summary-container" class="hidden mb-4">
    <div class="summary-box">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <h3 class="summary-title">
                <svg class="ai-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
                Thread Summary
            </h3>
            <a onclick="document.getElementById('summary-container').classList.add('hidden')"
                style="font-size:12px;color:#818cf8;cursor:pointer">Dismiss</a>
        </div>
        <div id="summary-text" class="summary-text"></div>
    </div>
</div>

<div id="timeline" class="mb-4"></div>

<!-- Comment form -->
<div class="topic-header">
    <h3 style="font-size:14px;font-weight:600;color:#475569;margin-bottom:12px">Add an update</h3>
    <form id="comment-form">
        <textarea id="comment-body" name="body" rows="3" required
            placeholder="Share an update, question, or response..."
            class="textarea mb-3"></textarea>

        <!-- AI Tone buttons -->
        <div class="tone-bar">
            <span class="tone-label">
                <svg class="ai-icon" style="color:#8b5cf6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
                Adjust tone
            </span>
            <button type="button" onclick="rewriteTone('softer')" class="tone-btn tone-softer">Softer</button>
            <button type="button" onclick="rewriteTone('stronger')" class="tone-btn tone-stronger">Stronger</button>
            <button type="button" onclick="rewriteTone('neutral')" class="tone-btn tone-neutral">Neutral</button>
            <button type="button" onclick="rewriteTone('professional')" class="tone-btn tone-professional">Professional</button>
            <button type="button" onclick="rewriteTone('shorter')" class="tone-btn tone-short">Shorter</button>
            <button type="button" onclick="rewriteTone('longer')" class="tone-btn tone-long">Longer</button>
            <button type="button" onclick="rewriteTone('more_detailed')" class="tone-btn tone-detail">More Detail</button>
            <button type="button" onclick="rewriteTone('less_detailed')" class="tone-btn tone-detail">Less Detail</button>
        </div>

        <!-- Rewrite status -->
        <div id="rewrite-status" class="rewrite-status hidden">
            <svg class="ai-icon" style="color:#8b5cf6;flex-shrink:0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
            <span id="rewrite-msg"></span>
            <a onclick="undoRewrite()" id="undo-btn" class="hidden">Undo</a>
        </div>

        <!-- Appropriateness warning -->
        <div id="appropriateness-warning" class="warning-box hidden">
            <p class="warning-title">
                <svg style="width:16px;height:16px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>
                Heads up
            </p>
            <p id="appropriateness-reason" class="warning-text"></p>
            <div class="warning-actions">
                <button type="button" onclick="makeNice()" class="btn btn-sm btn-primary" style="gap:4px">
                    <svg class="ai-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
                    Make nice
                </button>
                <button type="button" onclick="dismissWarning()" class="btn btn-sm btn-secondary">Edit my message</button>
                <button type="button" onclick="postAnyway()" class="btn btn-sm" style="background:#fef3c7;color:#92400e">Post anyway</button>
            </div>
        </div>

        <!-- Attachment upload -->
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
            <label style="display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border:1px solid #e2e8f0;border-radius:8px;cursor:pointer;font-size:12px;color:#64748b;background:#f8fafc">
                <svg style="width:14px;height:14px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>
                Attach file
                <input type="file" id="attachment-file" style="display:none"
                    accept=".pdf,.jpg,.jpeg,.png,.gif,.webp,.heic,.doc,.docx,.xlsx,.txt,.csv">
            </label>
            <span id="attachment-name" style="font-size:12px;color:#94a3b8"></span>
        </div>

        <button type="submit" id="btn-post" class="btn btn-primary">Post Update</button>
    </form>
</div>

<!-- Attachments section -->
<div id="attachments-section" class="hidden topic-header mt-2">
    <h3 style="font-size:14px;font-weight:600;color:#475569;margin-bottom:12px;display:flex;align-items:center;gap:6px">
        <svg style="width:16px;height:16px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>
        Attachments
    </h3>
    <div id="attachments-list"></div>
</div>

<script>
const issueId = {{ issue_id | tojson }};
const userRole = {{ user.role | tojson }};
let isMuted = false;

function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function fmtDate(ts) { if (!ts) return ''; const d = ts.endsWith('Z') ? ts : ts + 'Z'; return new Date(d).toLocaleString(); }

const aiIconSvg = '<svg class="ai-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>';

async function loadIssue() {
    try {
        const resp = await fetch(`/api/issues/${issueId}`);
        if (resp.status === 401) { window.location = '/login'; return; }
        const issue = await resp.json();
        renderHeader(issue);
    } catch (e) {
        document.getElementById('topic-header').innerHTML =
            '<div class="empty-state" style="color:#ef4444">Failed to load topic.</div>';
    }
}

function renderHeader(issue) {
    // Priority select — both parents can change
    const prioritySelect = `
        <select id="priority-select" class="select" style="width:auto;padding:6px 12px;font-size:13px">
            <option value="low" ${issue.priority === 'low' ? 'selected' : ''}>Low</option>
            <option value="normal" ${issue.priority === 'normal' ? 'selected' : ''}>Normal</option>
            <option value="high" ${issue.priority === 'high' ? 'selected' : ''}>High</option>
            <option value="urgent" ${issue.priority === 'urgent' ? 'selected' : ''}>Urgent</option>
        </select>
        <button onclick="updatePriority()" class="btn btn-sm btn-secondary">Update Priority</button>`;

    // Due date — both parents can set/change/remove
    const dueDateControl = `
        <span style="width:1px;height:24px;background:#e2e8f0;margin:0 4px"></span>
        <input type="date" id="due-date-input" class="select" style="width:auto;padding:6px 12px;font-size:13px"
            value="${issue.due_date || ''}">
        <button onclick="updateDueDate()" class="btn btn-sm btn-secondary">Set Due Date</button>
        ${issue.due_date ? `<button onclick="clearDueDate()" class="btn btn-sm" style="font-size:11px;color:#94a3b8;background:transparent;padding:4px 8px">Remove</button>` : ''}`;

    // Mute button
    const muteBtn = `
        <button onclick="toggleMute()" id="btn-mute" class="btn btn-sm" style="font-size:11px;color:#94a3b8;background:transparent;padding:4px 8px;margin-left:auto">
            ${isMuted ? '🔔 Unmute' : '🔕 Mute notifications'}
        </button>`;

    let statusActions = '';
    if (userRole === 'parent_a') {
        statusActions = `
            <div class="status-actions">
                <select id="status-select" class="select" style="width:auto;padding:6px 12px;font-size:13px">
                    <option value="open" ${issue.status === 'open' ? 'selected' : ''}>Open</option>
                    <option value="in_progress" ${issue.status === 'in_progress' ? 'selected' : ''}>In Progress</option>
                    <option value="waiting_on_parent_a" ${issue.status === 'waiting_on_parent_a' ? 'selected' : ''}>Needs Joey's input</option>
                    <option value="waiting_on_parent_b" ${issue.status === 'waiting_on_parent_b' ? 'selected' : ''}>Needs Christina's input</option>
                    <option value="resolved" ${issue.status === 'resolved' ? 'selected' : ''}>Resolved together</option>
                    <option value="closed" ${issue.status === 'closed' ? 'selected' : ''}>Closed</option>
                </select>
                <button onclick="updateStatus()" class="btn btn-sm btn-secondary">Update Status</button>
                <span style="width:1px;height:24px;background:#e2e8f0;margin:0 4px"></span>
                ${prioritySelect}
                ${dueDateControl}
                ${muteBtn}
            </div>`;
    } else {
        statusActions = `
            <div class="status-actions">
                ${prioritySelect}
                ${dueDateControl}
                ${muteBtn}
            </div>`;
    }

    document.getElementById('topic-header').innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div style="flex:1;min-width:0">
                <div class="topic-title">${esc(issue.title)}</div>
                <div class="card-meta">
                    <span class="badge badge-${issue.category}">${esc(issue.category)}</span>
                    <span class="status status-${issue.status}" style="font-size:13px">${esc(issue.display_status)}</span>
                    ${issue.due_date ? `<span style="color:#ea580c;font-weight:500;font-size:12px">Due ${issue.due_date}</span>` : ''}
                </div>
            </div>
            <button onclick="summarizeThread()" id="btn-summarize" class="btn-summarize">
                ${aiIconSvg} Summarize
            </button>
        </div>
        ${issue.description ? `<p class="topic-desc">${esc(issue.description)}</p>` : ''}
        ${issue.title.toLowerCase().includes('practice') ? `
            <div style="margin-top:12px;padding-top:12px;border-top:1px solid #f1f5f9;display:flex;align-items:center;gap:8px">
                <button onclick="clearPractice()" class="btn btn-sm btn-secondary" style="font-size:11px;color:#94a3b8">
                    Clear all test messages
                </button>
                <span style="font-size:11px;color:#cbd5e1">Auto-clears every 10 minutes</span>
            </div>` : ''}
        ${statusActions}
    `;
}

async function loadTimeline() {
    try {
        const resp = await fetch(`/api/issues/${issueId}/timeline`);
        const entries = await resp.json();
        cachedTimeline = entries;
        renderTimeline(entries);
    } catch (e) {
        document.getElementById('timeline').innerHTML =
            '<div class="empty-state" style="color:#ef4444">Failed to load updates.</div>';
    }
}

const VISIBLE_LIMIT = 5;

function renderTimeline(entries) {
    const el = document.getElementById('timeline');
    if (!entries.length) {
        el.innerHTML = '<div class="empty-state">No updates yet. Start the conversation below.</div>';
        return;
    }

    const showAll = entries.length <= VISIBLE_LIMIT;
    const visible = showAll ? entries : entries.slice(-VISIBLE_LIMIT);
    const hiddenCount = entries.length - visible.length;

    let html = '';
    if (!showAll) {
        html += `<div style="text-align:center;padding:8px">
            <button onclick="showAllEntries()" id="btn-show-more" class="btn btn-sm btn-secondary" style="font-size:12px">
                Show ${hiddenCount} earlier update${hiddenCount !== 1 ? 's' : ''}
            </button>
        </div>`;
    }
    html += visible.map(e => renderEntry(e)).join('');
    el.innerHTML = html;
}

function showAllEntries() {
    const el = document.getElementById('timeline');
    el.innerHTML = cachedTimeline.map(e => renderEntry(e)).join('');
}

function renderEntry(e) {
        if (e.type === 'comment') {
            const date = fmtDate(e.created_at);
            const initials = (e.actor?.display_name || 'U').charAt(0).toUpperCase();
            const avatarClass = e.actor?.role === 'parent_a' ? 'avatar-a' : 'avatar-b';
            return `
                <div class="comment">
                    <div class="comment-header">
                        <div class="avatar ${avatarClass}">${initials}</div>
                        <div>
                            <span class="comment-author">${esc(e.actor?.display_name || 'Unknown')}</span>
                            <span class="comment-date" style="margin-left:8px">${date}</span>
                        </div>
                    </div>
                    <div class="comment-body">${esc(e.body.length > 300 ? e.body.slice(0, 300) + '...' : e.body)}</div>
                    ${e.body.length > 300 ? `<span class="full-body" hidden>${esc(e.body)}</span><a onclick="this.parentElement.querySelector('.comment-body').textContent=this.previousElementSibling.textContent;this.previousElementSibling.remove();this.remove()" style="color:#2563eb;cursor:pointer;font-size:12px">Show more</a>` : ''}
                </div>`;
        } else {
            const date = fmtDate(e.created_at);
            return `
                <div class="status-change">
                    <div class="line"></div>
                    <span>${esc(e.actor?.display_name || 'System')} changed status to <strong>${esc(e.new_display || e.new_status)}</strong></span>
                    <span>${date}</span>
                    <div class="line"></div>
                </div>`;
        }
}

async function updateStatus() {
    const newStatus = document.getElementById('status-select').value;
    try {
        await fetch(`/api/issues/${issueId}`, {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({status: newStatus}),
        });
        loadIssue();
        loadTimeline();
    } catch (e) { alert('Failed to update status'); }
}

async function updatePriority() {
    const newPriority = document.getElementById('priority-select').value;
    try {
        await fetch(`/api/issues/${issueId}`, {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({priority: newPriority}),
        });
        loadIssue();
    } catch (e) { alert('Failed to update priority'); }
}

let skipCheck = false;
let cachedTimeline = [];

document.getElementById('comment-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const body = document.getElementById('comment-body').value.trim();
    if (!body) return;

    const btnPost = document.getElementById('btn-post');
    const threadHistory = cachedTimeline
        .filter(e => e.type === 'comment')
        .map(e => ({ author: e.actor?.display_name || 'Unknown', body: e.body || '' }));

    if (!skipCheck) {
        btnPost.disabled = true;
        btnPost.textContent = 'Checking...';
        try {
            const checkResp = await fetch('/api/ai/check', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({text: body, thread_history: threadHistory}),
            });
            if (checkResp.ok) {
                const check = await checkResp.json();
                if (!check.appropriate) {
                    document.getElementById('appropriateness-reason').textContent = check.reason;
                    document.getElementById('appropriateness-warning').classList.remove('hidden');
                    btnPost.disabled = true;
                    btnPost.textContent = 'Post Update';
                    return;
                }
            }
        } catch (err) { }
        btnPost.disabled = false;
        btnPost.textContent = 'Post Update';
    }
    skipCheck = false;

    try {
        const resp = await fetch(`/api/issues/${issueId}/comments`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({body}),
        });
        if (resp.ok) {
            const comment = await resp.json();
            // Upload attachment if one was selected
            const fileInput = document.getElementById('attachment-file');
            if (fileInput.files.length > 0) {
                await uploadAttachment(comment.id);
            }
            document.getElementById('comment-body').value = '';
            document.getElementById('appropriateness-warning').classList.add('hidden');
            document.getElementById('rewrite-status').classList.add('hidden');
            originalText = '';
            loadTimeline();
            loadAttachments();
        }
    } catch (e) { alert('Failed to post update'); }
});

function postAnyway() {
    skipCheck = true;
    document.getElementById('appropriateness-warning').classList.add('hidden');
    document.getElementById('btn-post').disabled = false;
    document.getElementById('comment-form').requestSubmit();
}

function dismissWarning() {
    document.getElementById('appropriateness-warning').classList.add('hidden');
    document.getElementById('btn-post').disabled = false;
    document.getElementById('comment-body').focus();
}

async function makeNice() {
    document.getElementById('appropriateness-warning').classList.add('hidden');
    document.getElementById('btn-post').disabled = false;
    await rewriteTone('softer');
}

// ── AI Thread Summary ────────────────────────────────────────────────────
async function summarizeThread() {
    const btn = document.getElementById('btn-summarize');
    const container = document.getElementById('summary-container');
    const textEl = document.getElementById('summary-text');

    btn.disabled = true;
    btn.innerHTML = `${aiIconSvg} Summarizing...`;

    try {
        const resp = await fetch(`/api/ai/summarize/${issueId}`);
        if (!resp.ok) {
            const err = await resp.json();
            textEl.textContent = err.detail || 'Could not generate summary.';
        } else {
            const data = await resp.json();
            textEl.textContent = data.summary;
        }
        container.classList.remove('hidden');
    } catch (e) {
        textEl.textContent = 'Could not connect to summary service.';
        container.classList.remove('hidden');
    } finally {
        btn.disabled = false;
        btn.innerHTML = `${aiIconSvg} Summarize`;
    }
}

// ── AI Tone Rewrite ──────────────────────────────────────────────────────
let originalText = '';

async function rewriteTone(tone) {
    const textarea = document.getElementById('comment-body');
    const text = textarea.value.trim();
    if (!text) { textarea.focus(); return; }

    if (!originalText) originalText = text;

    const statusEl = document.getElementById('rewrite-status');
    const msgEl = document.getElementById('rewrite-msg');
    const undoBtn = document.getElementById('undo-btn');
    statusEl.classList.remove('hidden');
    msgEl.textContent = 'Rewriting...';
    undoBtn.classList.add('hidden');

    document.querySelectorAll('.tone-btn').forEach(b => b.disabled = true);

    try {
        const resp = await fetch('/api/ai/rewrite', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ text, tone }),
        });

        if (!resp.ok) {
            const err = await resp.json();
            msgEl.textContent = err.detail || 'Rewrite failed';
            return;
        }

        const data = await resp.json();
        textarea.value = data.rewritten;
        textarea.style.height = 'auto';
        textarea.style.height = textarea.scrollHeight + 'px';

        const label = tone.replace('_', ' ');
        msgEl.textContent = `Adjusted to "${label}" tone`;
        undoBtn.classList.remove('hidden');
    } catch (e) {
        msgEl.textContent = 'Could not connect to rewrite service';
    } finally {
        document.querySelectorAll('.tone-btn').forEach(b => b.disabled = false);
    }
}

function undoRewrite() {
    if (!originalText) return;
    document.getElementById('comment-body').value = originalText;
    originalText = '';
    document.getElementById('rewrite-status').classList.add('hidden');
}

async function updateDueDate() {
    const val = document.getElementById('due-date-input').value;
    if (!val) return;
    try {
        await fetch(`/api/issues/${issueId}`, {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({due_date: val}),
        });
        loadIssue();
    } catch (e) { alert('Failed to update due date'); }
}

async function clearDueDate() {
    try {
        await fetch(`/api/issues/${issueId}`, {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({clear_due_date: true}),
        });
        loadIssue();
    } catch (e) { alert('Failed to remove due date'); }
}

async function toggleMute() {
    try {
        if (isMuted) {
            await fetch(`/api/notifications/mute/${issueId}`, { method: 'DELETE' });
            isMuted = false;
        } else {
            await fetch(`/api/notifications/mute/${issueId}`, { method: 'POST' });
            isMuted = true;
        }
        loadIssue();
    } catch (e) { alert('Failed to update mute'); }
}

async function clearPractice() {
    try {
        await fetch(`/api/issues/${issueId}/clear-comments`, { method: 'POST' });
        loadTimeline();
    } catch (e) { alert('Failed to clear'); }
}

// ── Attachments ────────────────────────────────────────────────────────────

// Show filename when file selected
document.getElementById('attachment-file').addEventListener('change', (e) => {
    const file = e.target.files[0];
    const nameEl = document.getElementById('attachment-name');
    if (file) {
        const sizeMB = (file.size / (1024*1024)).toFixed(1);
        nameEl.textContent = `${file.name} (${sizeMB}MB)`;
        nameEl.style.color = file.size > 10*1024*1024 ? '#dc2626' : '#64748b';
    } else {
        nameEl.textContent = '';
    }
});

// Upload attachment after comment is posted (or standalone)
async function uploadAttachment(commentId) {
    const fileInput = document.getElementById('attachment-file');
    const file = fileInput.files[0];
    if (!file) return;

    const formData = new FormData();
    formData.append('file', file);

    let url = `/api/attachments/upload/${issueId}`;
    if (commentId) url += `?comment_id=${commentId}`;

    try {
        const resp = await fetch(url, { method: 'POST', body: formData });
        if (resp.ok) {
            fileInput.value = '';
            document.getElementById('attachment-name').textContent = '';
            loadAttachments();
        } else {
            const err = await resp.json();
            alert(err.detail || 'Upload failed');
        }
    } catch (e) { alert('Upload failed'); }
}

async function loadAttachments() {
    try {
        const resp = await fetch(`/api/attachments/issue/${issueId}`);
        if (!resp.ok) return;
        const atts = await resp.json();

        const section = document.getElementById('attachments-section');
        const list = document.getElementById('attachments-list');

        if (!atts.length) {
            section.classList.add('hidden');
            return;
        }

        section.classList.remove('hidden');
        list.innerHTML = atts.map(a => {
            const sizeFmt = a.size > 1024*1024 ? `${(a.size/(1024*1024)).toFixed(1)}MB` : `${(a.size/1024).toFixed(0)}KB`;
            const isImage = a.content_type.startsWith('image/');
            const icon = isImage
                ? '<svg style="width:16px;height:16px;flex-shrink:0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>'
                : '<svg style="width:16px;height:16px;flex-shrink:0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>';

            return `
                <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f1f5f9">
                    ${icon}
                    <div style="flex:1;min-width:0">
                        <a href="/api/attachments/download/${a.id}" target="_blank"
                           style="font-size:13px;font-weight:500;color:#2563eb;text-decoration:underline">${esc(a.filename)}</a>
                        <span style="font-size:11px;color:#94a3b8;margin-left:6px">${sizeFmt}</span>
                    </div>
                    <span style="font-size:11px;color:#94a3b8">${esc(a.uploaded_by)} · ${fmtDate(a.created_at)}</span>
                </div>`;
        }).join('');
    } catch (e) {}
}
